services:
  - type: web
    name: sentinelai-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_ORIGINS
        sync: false  # set to your deployed Vercel URL, e.g. https://sentinelai.vercel.app
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_NIM_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_NIM_MODEL
        value: meta/llama-3.1-70b-instruct
      - key: OPENWEATHER_API_KEY
        sync: false
